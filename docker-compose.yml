version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: healthshop_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: healthshop_ai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:latest
    container_name: healthshop_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    container_name: healthshop_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  mongodb_data:
